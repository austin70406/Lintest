<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2i5zli07cm_Vde7zYPrlCrgCOkKQ3vf4",
        authDomain: "game-test-fcec2.firebaseapp.com",
        projectId: "game-test-fcec2",
        storageBucket: "game-test-fcec2.firebasestorage.app",
        messagingSenderId: "354396726740",
        appId: "1:354396726740:web:52ece7a43fdafcfae8e241"
    };

    const appId = "global-valve-defender-data";
    let db, auth, currentUser;
    let isOfflineMode = false;
    let currentSessionName = ""; // 本次遊戲使用的名稱
    let bestScore = 0; // 設備紀錄的最高分
    let bestDate = ""; // 最佳分數的日期

    let isPlaying = false;
    let timeLeft = 20.0;
    let sessionScore = 0;
    let timerInterval = null;

    const screens = { 
        loading: document.getElementById('loading-screen'), 
        login: document.getElementById('login-screen'), 
        game: document.getElementById('game-screen') 
    };
    const inputNickname = document.getElementById('input-nickname');
    const btnStart = document.getElementById('btn-start');
    const valveBtn = document.getElementById('valve-btn');
    const displayScore = document.getElementById('display-score');
    const displayName = document.getElementById('display-name');
    const displayHighScore = document.getElementById('display-high-score');
    const displayTime = document.getElementById('display-time');
    const btnStartSession = document.getElementById('btn-start-session');
    const gameInstruction = document.getElementById('game-instruction');
    const leaderboardContainer = document.getElementById('leaderboard-container');
    const onlineCount = document.getElementById('online-count');

    function getTodayStr() {
        const now = new Date();
        return `${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')}`;
    }

    function showScreen(name) {
        Object.values(screens).forEach(s => s.classList.add('hidden'));
        screens[name].classList.remove('hidden');
        screens[name].classList.add('flex');
    }

    async function init() {
        // 從本地讀取該設備的「個人最佳紀錄」
        const localData = localStorage.getItem('valve_defender_best_record');
        if (localData) {
            const parsed = JSON.parse(localData);
            bestScore = parsed.score || 0;
            bestDate = parsed.date || "";
        }

        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            
            const userCredential = await signInAnonymously(auth);
            currentUser = userCredential.user;

            // 每次進入都強制清空名稱輸入框
            inputNickname.value = ""; 
            showScreen('login');
        } catch (e) {
            console.warn("Firebase Error", e);
            isOfflineMode = true;
            inputNickname.value = ""; 
            showScreen('login');
            onlineCount.innerText = "狀態: 單機模式";
        }
    }

    function handleLogin() {
        const name = inputNickname.value.trim();
        if (!name) return alert("請輸入暱稱");
        
        currentSessionName = name;
        startGameUI();
    }

    function startGameUI() {
        displayName.innerText = currentSessionName;
        // 顯示該設備的歷史最高分
        displayHighScore.innerText = bestScore + (bestDate ? ` (${bestDate})` : "");
        showScreen('game');
        // 不論是否玩過，都要掛載排行榜監聽
        if (!isOfflineMode) startLeaderboardSync();
    }

    // 全球排行榜監聽（即時更新）
    function startLeaderboardSync() {
        const q = query(collection(db, appId), orderBy("score", "desc"), limit(50));
        onSnapshot(q, (snapshot) => {
            leaderboardContainer.innerHTML = "";
            let i = 1;
            snapshot.forEach((doc) => {
                const data = doc.data();
                // 這裡的 isMe 僅作為視覺參考，因為現在每個紀錄都是獨立的
                const isMe = currentUser && data.uid === currentUser.uid;
                renderRow(i++, data.name, data.score, data.date || "--/--", isMe);
            });
            onlineCount.innerText = `總紀錄數: ${snapshot.size}`;
        }, (err) => {
            console.error("Leaderboard error", err);
        });
    }

    function renderRow(rank, name, score, date, isMe) {
        const div = document.createElement('div');
        div.className = `rank-row ${isMe ? 'is-me' : ''}`;
        let badge = rank <= 3 ? `rank-${rank}` : 'rank-other';
        div.innerHTML = `
            <div class="rank-badge ${badge}">${rank}</div>
            <div class="flex-grow font-bold truncate">
                ${name} ${isMe ? '<span class="text-[10px] text-red-500">(你)</span>' : ''}
                <div class="text-[9px] text-gray-400 font-normal">${date}</div>
            </div>
            <div class="font-black text-lg">${score}</div>
        `;
        leaderboardContainer.appendChild(div);
    }

    function startSession() {
        if (isPlaying) return;
        isPlaying = true; sessionScore = 0; timeLeft = 20.0;
        displayScore.innerText = "0";
        btnStartSession.classList.add('hidden');
        gameInstruction.classList.remove('hidden');
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            if (timeLeft <= 0) { timeLeft = 0; endSession(); }
            displayTime.innerText = timeLeft.toFixed(1) + "s";
        }, 100);
    }

    async function endSession() {
        isPlaying = false;
        clearInterval(timerInterval);
        btnStartSession.classList.remove('hidden');
        gameInstruction.classList.add('hidden');
        btnStartSession.innerText = "再挑戰一次";

        const currentDate = getTodayStr();

        // 1. 更新本地設備的最佳紀錄
        if (sessionScore > bestScore) {
            bestScore = sessionScore;
            bestDate = currentDate;
            displayHighScore.innerText = bestScore + ` (${bestDate})`;
            localStorage.setItem('valve_defender_best_record', JSON.stringify({ score: bestScore, date: bestDate }));
        }

        // 2. 獨立儲存本次成績到雲端資料庫（即使分數低或名字相同，也會新增一筆紀錄）
        if (!isOfflineMode) {
            try {
                await addDoc(collection(db, appId), { 
                    name: currentSessionName, 
                    score: sessionScore, 
                    date: currentDate,
                    uid: currentUser.uid, // 用於識別該紀錄屬於哪個設備
                    timestamp: Date.now() 
                });
                // addDoc 成功後，Firestore 的 onSnapshot 會自動偵測到新資料並刷新排行榜
            } catch (e) { 
                console.error("Save session failed", e); 
            }
        }
    }

    valveBtn.addEventListener('pointerdown', (e) => {
        if (!isPlaying) return;
        sessionScore++;
        displayScore.innerText = sessionScore;
        const p = document.createElement('div');
        p.className = 'particle-score'; p.innerText = '+1';
        p.style.left = `${e.clientX}px`; p.style.top = `${e.clientY}px`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    });

    btnStart.addEventListener('click', handleLogin);
    btnStartSession.addEventListener('click', startSession);
    window.addEventListener('load', init);
</script>
