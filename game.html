<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Valve Defender | Edwards Lifesciences</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        edwards: { red: '#C8102E', gray: '#898D8D', ink: '#2D3436', paper: '#FDFBF7' }
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                        hand: ['Kalam', 'Noto Sans TC', 'cursive'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #FDFBF7;
            background-image: radial-gradient(#d5d0ce 1px, transparent 1px);
            background-size: 20px 20px;
            color: #2D3436;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        h1, h2, h3, .hand-font { font-family: 'Kalam', 'Noto Sans TC', cursive; }
        .sketch-box {
            background: #fff; border: 3px solid #2D3436;
            border-radius: 20px; padding: 20px;
            box-shadow: 6px 6px 0 rgba(200, 16, 46, 0.15);
            transition: all 0.3s ease; position: relative;
        }
        .sketch-btn {
            display: inline-flex; align-items: center; justify-content: center;
            background: #C8102E; color: #fff !important; border: 2px solid #2D3436;
            border-radius: 12px; padding: 10px 20px; font-weight: 700;
            box-shadow: 3px 3px 0 #2D3436; cursor: pointer; user-select: none;
        }
        .sketch-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #2D3436; }
        .sketch-input {
            border: 2px solid #2D3436; border-radius: 10px;
            padding: 12px; outline: none; text-align: center; width: 100%;
            font-size: 1.1rem; font-weight: bold;
        }
        .rank-row {
            display: flex; align-items: center; padding: 10px; margin-bottom: 8px;
            border: 2px dashed #898D8D; border-radius: 10px; background: #fff;
        }
        .rank-row.is-me { border: 2px solid #C8102E; background: #fff8f8; }
        .rank-badge { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-right: 10px; flex-shrink: 0; font-size: 0.8rem; }
        .rank-1 { background: #FFD700; color: #b8860b; border: 2px solid #b8860b; }
        .rank-2 { background: #E0E0E0; color: #757575; border: 2px solid #9e9e9e; }
        .rank-3 { background: #CD7F32; color: #5d4037; border: 2px solid #8d6e63; }
        .valve-core { cursor: pointer; transition: transform 0.05s ease; user-select: none; -webkit-tap-highlight-color: transparent; }
        .valve-core:active { transform: scale(0.9) !important; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.05); } 30% { transform: scale(1); } }
        .animate-heartbeat { animation: heartbeat 2s infinite; }
        .particle-score { position: absolute; color: #C8102E; font-family: 'Kalam', cursive; font-weight: bold; font-size: 1.5rem; pointer-events: none; animation: float-up 0.8s ease-out forwards; text-shadow: 2px 2px 0 #fff; z-index: 50; }
        @keyframes float-up { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body class="antialiased">

    <header class="w-full bg-white border-b-4 border-edwards-ink shadow-sm p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img class="h-8 md:h-10 object-contain" 
                 src="https://lh3.googleusercontent.com/d/1QJl_AerGZd0jRqOIZY-rCVVe6U67pmJM" 
                 alt="Edwards Logo" 
                 referrerpolicy="no-referrer"
                 onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/4/4b/Edwards_Lifesciences.svg';">
            <span class="font-bold text-edwards-ink hidden sm:inline border-l-2 border-slate-300 pl-3">互動挑戰區</span>
        </div>
        <a href="./index.html" class="text-xs font-bold text-edwards-ink border-2 border-edwards-ink px-3 py-1.5 rounded-full hover:bg-slate-50 shadow-[2px_2px_0_#2D3436]">
            <i class="fa-solid fa-arrow-left mr-1"></i>返回
        </a>
    </header>

    <main class="flex-grow p-4 w-full max-w-6xl mx-auto flex flex-col items-center">
        <div class="text-center mb-6 mt-4 w-full">
            <img class="h-20 md:h-24 object-contain mx-auto mb-6" 
                 src="https://lh3.googleusercontent.com/d/1QJl_AerGZd0jRqOIZY-rCVVe6U67pmJM" 
                 alt="Edwards Logo" 
                 referrerpolicy="no-referrer"
                 onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/4/4b/Edwards_Lifesciences.svg';">
            
            <h1 class="text-3xl md:text-5xl font-bold hand-font text-edwards-ink">Global Valve Defender</h1>
            <h2 class="text-sm md:text-xl font-bold text-edwards-gray">全球瓣膜保衛戰 - 20秒極限挑戰</h2>
        </div>

        <div id="loading-screen" class="sketch-box flex flex-col items-center justify-center py-12 w-full max-w-md mx-auto">
            <i class="fa-solid fa-heart-pulse text-edwards-red text-5xl animate-pulse mb-4"></i>
            <p class="font-bold text-lg hand-font">正在連接總部資料庫...</p>
        </div>

        <div id="main-content" class="hidden w-full flex flex-col lg:flex-row gap-6 pb-12">
            <div class="flex-1 flex flex-col gap-6">
                <div id="login-screen" class="sketch-box flex flex-col items-center justify-center p-8 w-full">
                    <i class="fa-solid fa-user-nurse text-edwards-red text-4xl mb-3"></i>
                    <h3 class="text-xl font-bold mb-1">報到！護心使者</h3>
                    <p class="text-gray-400 text-xs mb-6">請輸入本次挑戰的代號</p>
                    <input type="text" id="input-nickname" maxlength="10" placeholder="輸入暱稱..." class="sketch-input mb-4" autocomplete="off">
                    <button id="btn-start" class="sketch-btn text-lg w-full py-3">進入挑戰</button>
                </div>

                <div id="game-screen" class="hidden sketch-box bg-[#fff8f8] flex-col items-center justify-between p-4 min-h-[420px]">
                    <div class="text-center w-full bg-white/80 rounded-xl p-3 border-2 border-dashed border-edwards-ink relative mb-4">
                        <div class="absolute -top-3 -right-1 bg-yellow-400 px-2 py-0.5 rounded-full border-2 border-edwards-ink font-bold text-[10px] shadow-sm">
                            個人最高紀錄: <span id="display-high-score">0</span>
                        </div>
                        <p id="display-name" class="font-bold text-edwards-ink text-sm">Player</p>
                        <div class="text-xl font-mono font-black" id="display-time">20.0s</div>
                        <div class="text-6xl font-black text-edwards-red hand-font" id="display-score">0</div>
                    </div>

                    <div id="valve-btn" class="valve-core animate-heartbeat w-44 h-44 md:w-56 md:h-56 rounded-full border-4 border-edwards-ink bg-white flex items-center justify-center shadow-[6px_6px_0_#C8102E] my-4">
                        <i class="fa-solid fa-heart text-edwards-red text-[8rem] md:text-[10rem]"></i>
                    </div>

                    <div class="w-full flex justify-center min-h-[60px]">
                        <button id="btn-start-session" class="sketch-btn text-lg px-8 py-3 w-full max-w-[260px] animate-bounce">開始 20s 挑戰</button>
                        <p id="game-instruction" class="hidden font-bold text-lg text-edwards-red animate-pulse">瘋狂點擊心臟！</p>
                    </div>
                </div>
            </div>

            <div class="sketch-box w-full lg:w-[420px] flex flex-col p-4">
                <h3 class="text-xl font-bold border-b-2 border-edwards-ink mb-3 pb-2">
                    全球即時英雄榜 
                    <span id="sync-status" class="text-[9px] text-green-600 ml-2 hidden">更新中...</span>
                    <span id="online-count" class="text-[10px] float-right text-gray-400">連線中</span>
                </h3>
                <div id="leaderboard-container" class="flex-1 overflow-y-auto space-y-2 pr-1 max-h-[550px] min-h-[300px]">
                    <p class="text-center text-gray-400 text-xs py-10">資料同步中...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2i5zli07cm_Vde7zYPrlCrgCOkKQ3vf4",
            authDomain: "game-test-fcec2.firebaseapp.com",
            projectId: "game-test-fcec2",
            storageBucket: "game-test-fcec2.firebasestorage.app",
            messagingSenderId: "354396726740",
            appId: "1:354396726740:web:52ece7a43fdafcfae8e241"
        };

        const COLL_ID = "global-valve-defender-data";
        let db, auth, currentUser;
        let isOfflineMode = false;
        let currentSessionName = "";
        let bestScore = 0;
        let bestDate = "";

        let isPlaying = false;
        let timeLeft = 20.0;
        let sessionScore = 0;
        let timerInterval = null;

        const ui = {
            loading: document.getElementById('loading-screen'),
            mainContent: document.getElementById('main-content'),
            login: document.getElementById('login-screen'),
            game: document.getElementById('game-screen'),
            nickname: document.getElementById('input-nickname'),
            btnStart: document.getElementById('btn-start'),
            valve: document.getElementById('valve-btn'),
            score: document.getElementById('display-score'),
            name: document.getElementById('display-name'),
            best: document.getElementById('display-high-score'),
            time: document.getElementById('display-time'),
            btnPlay: document.getElementById('btn-start-session'),
            instr: document.getElementById('game-instruction'),
            leaderboard: document.getElementById('leaderboard-container'),
            count: document.getElementById('online-count'),
            syncStatus: document.getElementById('sync-status')
        };

        function getMMDD() {
            const d = new Date();
            return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
        }

        async function init() {
            const local = localStorage.getItem('valve_best_v2');
            if (local) {
                const p = JSON.parse(local);
                bestScore = p.score || 0;
                bestDate = p.date || "";
            }

            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                const userCred = await signInAnonymously(auth);
                currentUser = userCred.user;

                ui.loading.classList.add('hidden');
                ui.mainContent.classList.remove('hidden');
                ui.nickname.value = ""; 
                startRealtimeSync();
            } catch (e) {
                isOfflineMode = true;
                ui.loading.classList.add('hidden');
                ui.mainContent.classList.remove('hidden');
                ui.count.innerText = "狀態: 離線模式";
            }
        }

        function renderLeaderboard(snapshot) {
            ui.leaderboard.innerHTML = "";
            let i = 1;
            snapshot.forEach(doc => {
                const d = doc.data();
                const isMe = currentUser && d.uid === currentUser.uid;
                const row = document.createElement('div');
                row.className = `rank-row ${isMe ? 'is-me' : ''}`;
                row.innerHTML = `
                    <div class="rank-badge ${i<=3 ? 'rank-'+i : 'bg-gray-100 text-gray-400'}">${i++}</div>
                    <div class="flex-grow font-bold truncate text-xs">
                        ${d.name} ${isMe ? '<span class="text-[8px] text-red-500">(你)</span>' : ''}
                        <div class="text-[8px] text-gray-400 font-normal">${d.date || '--/--'}</div>
                    </div>
                    <div class="font-black text-sm">${d.score}</div>
                `;
                ui.leaderboard.appendChild(row);
            });
            ui.count.innerText = `總筆數: ${snapshot.size}`;
        }

        function startRealtimeSync() {
            if(!db) return;
            const q = query(collection(db, COLL_ID), orderBy("score", "desc"), limit(50));
            onSnapshot(q, (snap) => {
                renderLeaderboard(snap);
            });
        }

        async function forceRefresh() {
            if (!db || isOfflineMode) return;
            ui.syncStatus.classList.remove('hidden');
            const q = query(collection(db, COLL_ID), orderBy("score", "desc"), limit(50));
            const snap = await getDocs(q);
            renderLeaderboard(snap);
            setTimeout(() => ui.syncStatus.classList.add('hidden'), 1000);
        }

        ui.btnStart.addEventListener('click', () => {
            const val = ui.nickname.value.trim();
            if(!val) return alert("請輸入暱稱！");
            currentSessionName = val;
            ui.name.innerText = currentSessionName;
            ui.best.innerText = bestScore + (bestDate ? ` (${bestDate})` : "");
            
            ui.login.classList.add('hidden');
            ui.game.classList.remove('hidden');
            ui.game.classList.add('flex');
        });

        ui.btnPlay.addEventListener('click', () => {
            if(isPlaying) return;
            isPlaying = true; sessionScore = 0; timeLeft = 20.0;
            ui.score.innerText = "0";
            ui.btnPlay.classList.add('hidden');
            ui.instr.classList.remove('hidden');
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if(timeLeft <= 0) { timeLeft = 0; endSession(); }
                ui.time.innerText = timeLeft.toFixed(1) + "s";
            }, 100);
        });

        async function endSession() {
            isPlaying = false;
            clearInterval(timerInterval);
            ui.btnPlay.classList.remove('hidden');
            ui.instr.classList.add('hidden');
            ui.btnPlay.innerText = "再次挑戰";

            const today = getMMDD();

            if(sessionScore > bestScore) {
                bestScore = sessionScore;
                bestDate = today;
                ui.best.innerText = bestScore + ` (${bestDate})`;
                localStorage.setItem('valve_best_v2', JSON.stringify({score: bestScore, date: bestDate}));
            }

            if(db && currentUser) {
                try {
                    // 第一階段：立即新增並依賴 onSnapshot 更新
                    await addDoc(collection(db, COLL_ID), {
                        name: currentSessionName,
                        score: sessionScore,
                        date: today,
                        uid: currentUser.uid,
                        timestamp: Date.now()
                    });
                    
                    // 第二階段：遊戲結束後 10 秒重新整理
                    setTimeout(() => {
                        console.log("10秒自動更新...");
                        forceRefresh();
                    }, 10000);

                    // 第三階段：遊戲結束後 20 秒再次校準
                    setTimeout(() => {
                        console.log("20秒自動更新...");
                        forceRefresh();
                    }, 20000);

                } catch (e) { console.error("Save Error", e); }
            }
        }

        ui.valve.addEventListener('pointerdown', (e) => {
            if(!isPlaying) return;
            sessionScore++;
            ui.score.innerText = sessionScore;
            const p = document.createElement('div');
            p.className = 'particle-score'; p.innerText = '+1';
            p.style.left = `${e.clientX}px`; p.style.top = `${e.clientY}px`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
